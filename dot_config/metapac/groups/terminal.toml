arch = {
  packages = [
    "zsh",
    "zsh-autosuggestions",
    "zsh-syntax-highlighting",
    "neovim",
    "ripgrep",
    "tmux",
    "go-yq",
    "jq",
    "shellcheck",
  ]
}

apt = {
  packages = [
    "zsh",
    "zsh-autosuggestions",
    "zsh-syntax-highlighting",
    # neovim + tmux on Ubuntu: see groups/apt-outdated.toml.tmpl (mise instead — apt too old)
    "ripgrep",
    "yq",
    "jq",
    "shellcheck",
  ]
}

cargo = {
  packages = [
    "bat",
    "zoxide",
    "nu",
    "sheldon",
    "tree-sitter-cli",
    "fd-find",
    "eza",
    "tlrc",
    "tsql",
    "television",
  ]
}

mise = {
  packages = [
    "fzf",
  ]
}

go = {
  packages = [
    "github.com/jesseduffield/lazygit",
    "github.com/cli/cli/v2/cmd/gh",
    "github.com/joshmedeski/sesh/v2"
  ]
}
