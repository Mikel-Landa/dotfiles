npm = {
  packages = [
    "@agentclientprotocol/claude-agent-acp",
  ]
}

arch = { packages = [{ name = "zig" }] }

cargo = {
  packages = [
    {
      name = "fff-mcp",
      options = {
        git = "https://github.com/dmtrKovalenko/fff",
        binstall = false,
      }
    },
  ]
}

uv = {
  packages = [
    {
      name = "graphifyy",
      hooks = {
        after_install = [
          "sh",
          "-c",
          "graphify install && graphify cursor install"
        ]
      }
    },
    {
      name = "peasyai-mcp",
      options = {
        from = "https://github.com/p-org/P/releases/download/peasyai-v1.0.0/peasyai_mcp-1.0.0-py3-none-any.whl",
      }
    }
  ]
}
