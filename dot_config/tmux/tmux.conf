# Options
set -g mouse on        #For tmux version 2.1 and up
set -g escape-time 0  # disable delays on escape sequences
set -g renumber-windows on  # keep numbering sequential
set -g repeat-time 1000  # increase "prefix-free" window
set -g status-interval 3        # Update the status bar every 3 seconds (default: 15 seconds)
set -g allow-passthrough on     # Allow programs in the pane to bypass tmux (e.g. for image preview)
set -g status-position bottom


# Options: start indexes from 1
set -g base-index 1
set -g pane-base-index 1

# Change prefix
unbind C-b                  # remove bind for C-b
set-option -g prefix M-Space # Alt+Space
bind-key M-Space send-prefix

# Fix truecolor
set -ga terminal-overrides ",*-256color:Tc"
# Styled + colored undercurls (used by nvim diagnostics)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Forward extended keys so nvim sees <C-CR>, <C-S-CR>, etc. as distinct from <C-j>
# `always` = tmux both requests extended keys from outer terminal AND forwards to inner apps.
# `csi-u` format = fixterms encoding; kitty speaks this (kitty does NOT support xterm modifyOtherKeys).
# Required so C-m / C-i / C-Enter are distinguishable from Enter / Tab.
set -s extended-keys on
set -s extended-keys-format csi-u
set -as terminal-features ',*:extkeys'

# Ignore F24
set -s user-keys[0] "\e[28~"
bind-key -n User0 run-shell -b true

# Create Panes: window splitting
# Split vertically
unbind %
bind \\ split-window -h -c "#{pane_current_path}"    # Prefix \ to create vertical split
# Split horizontally
unbind '"'
bind - split-window -v -c "#{pane_current_path}"   # Prefix - to create horizontal split

# Window navigation: Prefix n = next (default), Prefix N = previous
bind N previous-window

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.config/tmux/tmux.conf

bind-key x kill-pane           # skip "kill-pane 1? (y/n)" prompt
set -g detach-on-destroy off   # don't exit tmux when closing a session

# Rounded borders for all popups
set -g popup-border-lines rounded

# Session picker via sesh + fzf (all sources: tmux + config + zoxide)
unbind t
bind-key t       display-popup -E -h 80% -w 80% "sesh connect \"\$(sesh list --icons | fzf --ansi --reverse --header='sesh' | sed -E 's/^[^ ]+ +//')\""
# Alt-s: default tmux session picker (choose-tree)
bind-key -n M-s  choose-tree -Zs
# Prefix-s: same picker but only tmux sessions (no zoxide / fd / configs)
bind-key s       display-popup -E -h 80% -w 80% "sesh connect \"\$(sesh list -t --icons | fzf --ansi --reverse --header='sesh: tmux only' | sed -E 's/^[^ ]+ +//')\""

# Toggle scratch terminal popup (Alt+m, no prefix). 60% centered.
# Outside scratch session: open popup attached to scratch.
# Inside scratch session: detach -> popup closes.
# Disable statusline inside scratch (popup is its only display, statusline = noise).
bind-key -n M-m if-shell -F '#{==:#{session_name},scratch}' \
  'detach-client' \
  'display-popup -E -w 60% -h 60% -d "#{pane_current_path}" "tmux new-session -A -s scratch \\; set status off"'

# Code project picker: zoxide-frecency repos under ~/repos + fd-discovered, dedup
# via awk, fuzzy-picked with fzf, then handed to `code-session`.
bind-key Space   display-popup -E -h 80% -w 80% "code-session \"\$({ zoxide query -l | grep \"^\$HOME/repos/\" | while IFS= read -r d; do [ -d \"\$d/.git\" ] && echo \"\$d\"; done; fd -g .git -HL -t d -d 6 ~/repos --exec dirname '{}'; } | awk '!seen[\$0]++' | fzf --reverse --header='code project' --delimiter=/ --with-nth=-1)\""
bind-key M-Space display-popup -E -h 80% -w 80% "code-session \"\$({ zoxide query -l | grep \"^\$HOME/repos/\" | while IFS= read -r d; do [ -d \"\$d/.git\" ] && echo \"\$d\"; done; fd -g .git -HL -t d -d 6 ~/repos --exec dirname '{}'; } | awk '!seen[\$0]++' | fzf --reverse --header='code project' --delimiter=/ --with-nth=-1)\""

# Theme: matugen-generated palette (regenerated on wallpaper change)
source-file -q ~/.config/tmux/colors.conf

# Theme: borders
set -g pane-border-lines simple
set -g pane-border-style "fg=#{@color_dim}"
set -g pane-active-border-style "fg=#{@color_accent}"

# Theme: status
set -g status-style "bg=default,fg=#{@color_muted}"
set -g status-left ""
set -g status-right "#[fg=#{@color_muted}]#S"

# Theme: status (windows)
set -g window-status-format "●"
set -g window-status-current-format "●"
set -g window-status-current-style "#{?window_zoomed_flag,fg=#{@color_alt},fg=#{@color_accent}#,nobold}"
set -g window-status-bell-style "fg=#{@color_error},nobold"

###########################
# Plugins
###########################
# To install plugins
#   1) Add plugin down here
#   2) Prefix + I to install plugin
# To update plugins:
#   1) Prefix + U
# To remove plugins:
#   1) Remove line down here
#   2) Prefix + ALT + U

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'hendrikmi/tmux-cpu-mem-monitor' # CPU and memory info

# Run Tmux Plugin Manager
run '~/.config/tmux/plugins/tpm/tpm'

# Override vim-tmux-navigator: pass C-j/C-k through when vim/fzf has focus
is_vim_or_fzf="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$|^[^TXZ ]+ +fzf$'"
bind-key -n C-j if-shell "$is_vim_or_fzf" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if-shell "$is_vim_or_fzf" 'send-keys C-k' 'select-pane -U'
